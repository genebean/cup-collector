repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-json
      - id: check-yaml

  - repo: local
    hooks:
      - id: nixfmt
        name: nixfmt
        entry: nix
        language: system
        types: [nix]
        pass_filenames: false
        args: ["fmt"]

      - id: deadnix
        name: deadnix
        entry: deadnix
        language: system
        types: [nix]
        pass_filenames: true

      - id: npmDepsHash-not-placeholder
        name: npmDepsHash must not be placeholder
        language: pygrep
        entry: "sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
        files: flake\.nix
        pass_filenames: false

      - id: docs-link-check
        name: Check internal docs links
        language: python
        entry: python3 scripts/check-docs-links.py
        pass_filenames: false
        files: ^docs/

      - id: htmlhint
        name: htmlhint
        language: node
        entry: htmlhint
        args: ["--config", ".htmlhintrc"]
        files: ^docs/.*\.html$
        additional_dependencies: ["htmlhint@1.1.4"]
