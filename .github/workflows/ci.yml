name: CI

on:
  pull_request:

jobs:
  pre-commit:
    uses: genebean/.github/.github/workflows/pre-commit-nix.yml@main

  nix-build:
    uses: genebean/.github/.github/workflows/nix-build.yml@main
    with:
      npmDepsHash-glob: flake.nix
      nixos-config-test: true

  dependency-review:
    name: dependency review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v5.0.0

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Audit for critical vulnerabilities
        # high-severity findings in next's bundled postcss and @ducanh2912/next-pwa's
        # workbox deps have no available fix without breaking changes upstream.
        # Blocking on critical only; Renovate will surface fixes when they land.
        run: npm audit --audit-level=critical
        working-directory: app

  unit-tests:
    name: unit tests
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: app
      - name: Run tests with JUnit output and coverage
        run: npm run test:coverage -- --reporter=default --reporter=junit --outputFile=test-results/junit.xml
        working-directory: app
      - name: Publish test results
        uses: dorny/test-reporter@v3
        if: success() || failure()
        with:
          name: unit test results
          path: app/test-results/junit.xml
          reporter: java-junit
          use-actions-summary: false
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: coverage/

  lint:
    name: next lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: app
      - name: Run ESLint
        run: npm run lint
        working-directory: app

  container-scan:
    name: container image scan (PocketBase)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Extract PocketBase image reference
        id: image
        run: |
          # Pull the image tag from the module default — single source of truth after
          # the flake.nix dev shell was aligned to the same version.
          REF=$(grep -oP 'default = "\Kghcr\.io/[^"]+' nixos/module.nix | grep pocketbase | head -1)
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"
      - uses: anchore/scan-action@v7
        with:
          image: ${{ steps.image.outputs.ref }}
          fail-build: true
          severity-cutoff: critical

  pb-migrations:
    name: PocketBase migrations (fresh instance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Extract PocketBase image reference
        id: image
        run: |
          REF=$(grep -oP 'default = "\Kghcr\.io/[^"]+' nixos/module.nix | grep pocketbase | head -1)
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"
      - name: Start PocketBase on a fresh instance with migrations
        env:
          IMAGE_REF: ${{ steps.image.outputs.ref }}
        run: |
          mkdir -p /tmp/pb_data
          docker run -d --name pb-test \
            -v "${{ github.workspace }}/pocketbase/migrations:/pb/pb_migrations:ro" \
            -v "/tmp/pb_data:/pb/pb_data" \
            -p 127.0.0.1:8090:8090 \
            "${IMAGE_REF}" \
            serve \
            --dir=/pb/pb_data \
            --migrationsDir=/pb/pb_migrations \
            --http=0.0.0.0:8090
      - name: Wait for healthy API
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8090/api/health > /dev/null; then
              echo "PocketBase is healthy"
              exit 0
            fi
            echo "Waiting... attempt $i/30"
            sleep 2
          done
          echo "PocketBase failed to start in 60s"
          docker logs pb-test
          exit 1
      - name: Verify no migration errors
        run: |
          docker logs pb-test 2>&1 | tee /tmp/pb-logs.txt
          if grep -iE 'migration.*error|failed.*migrat|error.*migrat' /tmp/pb-logs.txt; then
            echo "::error::Migration errors detected"
            exit 1
          fi
          echo "Migrations applied cleanly"
      - name: Stop container
        if: always()
        run: docker rm -f pb-test 2>/dev/null || true

  playwright:
    name: playwright e2e tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: app
      - name: Install Chrome
        run: npx playwright install chrome
        working-directory: app
      - name: Run Playwright tests
        run: npm run test:e2e
        working-directory: app
      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: app/playwright-report/
          retention-days: 7
